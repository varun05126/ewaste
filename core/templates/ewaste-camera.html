<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Waste AI Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 30px;
      font-weight: 800;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }
    .header h1 span { color: #16a34a; }
    .header p {
      color: #64748b;
      font-size: 14px;
      margin-top: 6px;
    }

    /* ── Card ── */
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    /* ── Camera viewport ── */
    .camera-wrap {
      position: relative;
      background: #f1f5f9;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 4/3;
      width: 100%;
      border: 2px solid #e2e8f0;
    }
    #video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    #snapshot {
      width: 100%; height: 100%;
      object-fit: cover; display: none;
    }
    .camera-off-msg {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #94a3b8; font-size: 14px; gap: 10px;
    }
    .camera-off-msg .icon { font-size: 52px; }

    /* scan overlay */
    .scan-line {
      position: absolute; left: 0; right: 0; height: 3px; top: 0;
      background: linear-gradient(90deg, transparent, #16a34a, transparent);
      animation: scan 1.8s linear infinite; display: none;
    }
    @keyframes scan { 0%{top:0;opacity:1} 90%{top:100%;opacity:1} 100%{top:100%;opacity:0} }
    .scan-active .scan-line { display: block; }
    .scan-active { border-color: #16a34a !important; }

    .corner { position: absolute; width: 22px; height: 22px; border-color: #16a34a; border-style: solid; display: none; }
    .corner.tl { top:10px; left:10px;  border-width: 3px 0 0 3px; }
    .corner.tr { top:10px; right:10px; border-width: 3px 3px 0 0; }
    .corner.bl { bottom:10px; left:10px;  border-width: 0 0 3px 3px; }
    .corner.br { bottom:10px; right:10px; border-width: 0 3px 3px 0; }
    .scan-active .corner { display: block; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 10px; margin-top: 18px; }
    .btn {
      flex: 1; padding: 13px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-start  { background: #1a1a2e; color: #fff; }
    .btn-start:hover  { box-shadow: 0 4px 12px rgba(26,26,46,0.25); }
    .btn-detect { background: #16a34a; color: #fff; }
    .btn-detect:hover { box-shadow: 0 4px 12px rgba(22,163,74,0.3); }
    .btn-stop   { background: #fff; color: #ef4444; border: 1.5px solid #fca5a5; }
    .btn-retake { background: #f1f5f9; color: #1a1a2e; border: 1.5px solid #e2e8f0; }

    /* ── Status badge ── */
    .status-wrap { margin-top: 20px; min-height: 72px; display: flex; align-items: center; justify-content: center; }
    .status-badge {
      border-radius: 14px; padding: 14px 20px; width: 100%; text-align: center;
      font-size: 18px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.3s ease;
    }
    .badge-waiting   { background: #fefce8; border: 1.5px solid #fde047; color: #854d0e; }
    .badge-scanning  { background: #eff6ff; border: 1.5px solid #93c5fd; color: #1d4ed8; }
    .badge-ewaste    { background: #f0fdf4; border: 1.5px solid #86efac; color: #15803d; }
    .badge-notewaste { background: #fef2f2; border: 1.5px solid #fca5a5; color: #dc2626; }
    .badge-error     { background: #f8fafc; border: 1.5px solid #cbd5e1; color: #64748b; }

    /* ── Result card ── */
    .result-card {
      margin-top: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
      display: none;
    }
    .result-card.visible { display: block; }

    .result-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    .result-title { font-size: 20px; font-weight: 800; color: #1a1a2e; }

    .tag {
      font-size: 11px; font-weight: 700; padding: 4px 11px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .tag-ewaste    { background: #dcfce7; color: #15803d; }
    .tag-recycl    { background: #dbeafe; color: #1d4ed8; }
    .tag-hazardous { background: #fee2e2; color: #dc2626; }
    .tag-other     { background: #f1f5f9; color: #475569; }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; margin-bottom: 14px;
    }
    .stat-box {
      background: #fff; border: 1px solid #e2e8f0;
      border-radius: 12px; padding: 12px 8px; text-align: center;
    }
    .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .stat-value { font-size: 15px; font-weight: 700; color: #1a1a2e; }
    .stat-reward { border-color: #fde047 !important; background: #fefce8 !important; }
    .stat-reward .stat-label { color: #a16207; }
    .stat-reward .stat-value { color: #92400e; }

    .conf-bar-wrap { margin-bottom: 14px; }
    .conf-bar-label { font-size: 12px; color: #64748b; margin-bottom: 5px; display: flex; justify-content: space-between; }
    .conf-bar-track { background: #e2e8f0; border-radius: 99px; height: 8px; overflow: hidden; }
    .conf-bar-fill  { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #16a34a, #2563eb); transition: width 0.6s ease; width: 0%; }

    .tip-box {
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 12px; padding: 12px 14px;
      font-size: 13px; color: #166534; line-height: 1.55;
    }

    /* ── Divider ── */
    .divider { height: 1px; background: #e2e8f0; margin: 20px 0; }

    canvas { display: none; }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 440px) {
      .header h1 { font-size: 24px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>♻️ E-Waste <span>AI Detector</span></h1>
    <p>Point your camera at any electronic item — AI identifies it instantly</p>
  </div>

  <div class="card">

    <!-- Camera -->
    <div class="camera-wrap" id="cameraWrap">
      <video id="video" autoplay playsinline></video>
      <img id="snapshot" alt="Captured" />
      <div class="camera-off-msg" id="offMsg">
        <span class="icon">📷</span>
        <span>Camera is off</span>
      </div>
      <div class="scan-line"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>

    <!-- Buttons -->
    <div class="btn-row" id="btnRow">
      <button class="btn btn-start" onclick="startCamera()">📷 Start Camera</button>
    </div>

    <!-- Status -->
    <div class="status-wrap">
      <div class="status-badge badge-waiting" id="statusBadge">
        ⏳ Waiting for camera…
      </div>
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="divider" style="margin-top:0;"></div>
      <div class="result-header">
        <div class="result-title" id="resultTitle">—</div>
        <div class="tag" id="resultTag">—</div>
      </div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Hazardous</div>
          <div class="stat-value" id="statHazard">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Confidence</div>
          <div class="stat-value" id="statConf">—</div>
        </div>
        <div class="stat-box stat-reward">
          <div class="stat-label">Reward</div>
          <div class="stat-value" id="statReward">—</div>
        </div>
      </div>
      <div class="conf-bar-wrap">
        <div class="conf-bar-label">
          <span>AI Confidence</span><span id="confPct">0%</span>
        </div>
        <div class="conf-bar-track">
          <div class="conf-bar-fill" id="confBar"></div>
        </div>
      </div>
      <div class="tip-box">
        💡 <span id="resultTip">—</span>
      </div>
    </div>

  </div>

  <canvas id="canvas"></canvas>

<script>
  const video       = document.getElementById("video");
  const snapshot    = document.getElementById("snapshot");
  const canvas      = document.getElementById("canvas");
  const offMsg      = document.getElementById("offMsg");
  const cameraWrap  = document.getElementById("cameraWrap");
  const btnRow      = document.getElementById("btnRow");
  const statusBadge = document.getElementById("statusBadge");
  const resultCard  = document.getElementById("resultCard");
  let stream = null;

  function setButtons(state) {
    const map = {
      idle:      `<button class="btn btn-start" onclick="startCamera()">📷 Start Camera</button>`,
      live:      `<button class="btn btn-detect" onclick="captureAndDetect()">🔍 Detect Waste</button>
                  <button class="btn btn-stop" onclick="stopCamera()">⏹ Stop</button>`,
      detecting: `<button class="btn btn-detect" disabled><span class="spinner"></span>&nbsp;Analyzing…</button>`,
      done:      `<button class="btn btn-retake" onclick="startCamera()">🔄 Retake</button>`,
    };
    btnRow.innerHTML = map[state] || map.idle;
  }

  function setStatus(type, html) {
    const cls = {
      waiting:   "badge-waiting",
      scanning:  "badge-scanning",
      ewaste:    "badge-ewaste",
      notewaste: "badge-notewaste",
      error:     "badge-error",
    };
    statusBadge.className = "status-badge " + (cls[type] || "badge-waiting");
    statusBadge.innerHTML = html;
  }

  async function startCamera() {
    resultCard.classList.remove("visible");
    snapshot.style.display = "none";
    video.style.display = "block";
    offMsg.style.display = "none";
    cameraWrap.classList.remove("scan-active");
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 } }
      });
      video.srcObject = stream;
      setButtons("live");
      setStatus("scanning", "🎥 Live — point at an electronic item");
    } catch(e) {
      offMsg.style.display = "flex";
      setStatus("error", "⚠️ Camera access denied");
      setButtons("idle");
    }
  }

  function stopCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null; video.srcObject = null;
    video.style.display = "none"; offMsg.style.display = "flex";
    cameraWrap.classList.remove("scan-active");
    setButtons("idle");
    setStatus("waiting", "⏳ Waiting for camera…");
  }

  async function captureAndDetect() {
    if (!stream) return;
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext("2d").drawImage(video, 0, 0);
    const imageData = canvas.toDataURL("image/jpeg", 0.85);

    snapshot.src = imageData;
    snapshot.style.display = "block";
    video.style.display = "none";
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null;

    cameraWrap.classList.add("scan-active");
    setButtons("detecting");
    setStatus("scanning", '<span class="spinner" style="border-top-color:#1d4ed8;border-color:rgba(29,78,216,0.2);"></span>&nbsp;AI is analyzing…');
    resultCard.classList.remove("visible");

    try {
      const res  = await fetch("/api/camera-detect/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: imageData }),
      });
      const data = await res.json();
      cameraWrap.classList.remove("scan-active");
      renderResult(data);
    } catch(err) {
      cameraWrap.classList.remove("scan-active");
      setStatus("error", "⚠️ Network error — check connection");
      setButtons("done");
    }
  }

  function renderResult(data) {
    setButtons("done");
    if (!data.success) {
      setStatus("error", "⚠️ " + (data.error || "Detection failed — try again"));
      return;
    }
    const r = data.result;

    setStatus(
      data.detected === "ewaste" ? "ewaste" : "notewaste",
      data.detected === "ewaste" ? "♻️ E-Waste Detected!" : "❌ Not E-Waste"
    );

    document.getElementById("resultTitle").textContent = r.waste_type || "Unknown";

    const tagEl  = document.getElementById("resultTag");
    const tagMap = {
      "E-Waste":    ["tag-ewaste",    "♻️ E-Waste"],
      "Recyclable": ["tag-recycl",    "🔵 Recyclable"],
      "Hazardous":  ["tag-hazardous", "⚠️ Hazardous"],
      "Non-E-Waste":["tag-other",     "🚫 Non-E-Waste"],
    };
    const [cls, lbl] = tagMap[r.category] || ["tag-other", r.category || "—"];
    tagEl.className = "tag " + cls;
    tagEl.textContent = lbl;

    document.getElementById("statHazard").textContent = r.hazardous ? "⚠️ Yes" : "✅ No";
    document.getElementById("statConf").textContent   = (r.confidence || 0) + "%";
    document.getElementById("statReward").textContent = "+" + (r.reward_points || 0) + " pts";

    const pct = Math.min(Math.max(r.confidence || 0, 0), 100);
    document.getElementById("confBar").style.width = pct + "%";
    document.getElementById("confPct").textContent  = pct + "%";
    document.getElementById("resultTip").textContent =
      r.disposal_tip || "Drop at an authorised e-waste collection centre.";

    resultCard.classList.add("visible");
  }
</script>
</body>
</html>
